<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Riddle Flow - 洗練されたなぞなぞ</title>
    
    <!-- Tailwind CSS (Aesthetics and layouts) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Sawarabi Mincho & Inter for premium HIG look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sawarabi+Mincho&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --hig-bg: #f5f5f7;
            --hig-card: rgba(255, 255, 255, 0.75);
            --hig-text-primary: #1d1d1f;
            --hig-text-secondary: #86868b;
            --hig-accent: #0071e3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro JP", "Noto Sans JP", sans-serif;
            background-color: var(--hig-bg);
            color: var(--hig-text-primary);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .mincho-title {
            font-family: "Sawarabi Mincho", serif;
        }

        /* ぼかしグラデーション背景アニメーション */
        .blur-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: #fbfbfd;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            mix-blend-mode: multiply;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #e3f2fd;
            top: -10%;
            left: -10%;
            animation-duration: 20s;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: #fce4ec;
            bottom: -20%;
            right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: #efebe9;
            top: 40%;
            left: 50%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
            33% { transform: translate(30px, -50px) scale(1.1) rotate(120deg); }
            66% { transform: translate(-20px, 20px) scale(0.95) rotate(240deg); }
            100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
        }

        /* HIG スタイルのガラスモーフィズム */
        .hig-panel {
            background: var(--hig-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.54);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .hig-panel:hover {
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.07);
        }

        /* タップフィードバック */
        .active-scale:active {
            transform: scale(0.97);
        }

        .transition-all-custom {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- ぼかし背景グラデーション -->
    <div class="blur-bg-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- メインコンテンツラッパー -->
    <div class="max-w-2xl mx-auto px-4 pt-10 sm:px-6">

        <!-- ヘッダー -->
        <header class="flex items-center justify-between mb-8 pb-4 border-b border-black/[0.04]">
            <div>
                <h1 class="text-3xl font-normal text-slate-900 mincho-title tracking-wider flex items-center gap-2">
                    <span>なぞなぞの書</span>
                    <span class="text-xs bg-black/5 text-black/60 font-sans tracking-normal px-2 py-0.5 rounded-full font-medium">Riddle Flow</span>
                </h1>
                <p class="text-xs text-slate-500 mt-1 font-light tracking-wide flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                    Termux 連携待機中
                </p>
            </div>

            <!-- 同期状態表示 -->
            <div class="flex flex-col items-end text-right">
                <span id="appStatusIndicator" class="text-[10px] text-slate-400 bg-white/80 border border-black/[0.04] px-2.5 py-1 rounded-full flex items-center gap-1.5 shadow-sm">
                    待機中
                </span>
            </div>
        </header>

        <!-- アプリケーション メインビュー -->
        <main class="relative">

            <!-- 空っぽ表示ビュー（データロード待ち状態の初期表示） -->
            <div id="emptyView" class="hig-panel p-8 text-center space-y-4">
                <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto">
                    <i data-lucide="database-backup" class="w-6 h-6 animate-pulse"></i>
                </div>
                <h3 class="text-lg font-medium text-slate-800">セットアップをお待ちしています</h3>
                <p class="text-sm text-slate-500 max-w-sm mx-auto">
                    Termux等からなぞなぞデータが注入されるのを待機しています。<br>
                    <code class="block bg-black/5 p-2 rounded text-xs mt-2 text-slate-700 font-mono text-left">updateRiddles(データ配列)</code>
                    を実行してデータをセットアップしてください。
                </p>
            </div>

            <!-- リストビュー (トップページ) -->
            <div id="listView" class="hidden space-y-4">
                <div class="flex items-center justify-between mb-4 px-1">
                    <span id="riddleCount" class="text-xs text-slate-400 font-medium">なぞなぞ --問</span>
                    <button onclick="shuffleRiddles()" class="active-scale text-xs text-slate-500 hover:text-black bg-white/70 border border-black/[0.04] px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm hover:shadow transition-all">
                        <i data-lucide="shuffle" class="w-3 h-3"></i>
                        <span>シャッフルする</span>
                    </button>
                </div>
                
                <!-- なぞなぞカード群 -->
                <div id="riddleList" class="grid gap-4">
                    <!-- 動的生成 -->
                </div>
            </div>

            <!-- ディテールビュー (個別ページ) -->
            <div id="detailView" class="hidden transition-all-custom">
                <!-- 戻るボタン -->
                <button onclick="backToList()" class="active-scale mb-4 flex items-center gap-1.5 text-xs text-slate-500 hover:text-black px-3 py-1.5 bg-white/80 border border-black/[0.04] rounded-full shadow-sm transition-all">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                    一覧に戻る
                </button>

                <!-- 個別クイズパネル -->
                <div class="hig-panel p-6 sm:p-8 space-y-8 relative overflow-hidden">
                    
                    <div class="flex items-center justify-between">
                        <span id="detailNo" class="text-xs font-semibold bg-black/5 text-black/60 px-2.5 py-1 rounded-full tracking-wider">RIDDLE</span>
                        <div class="flex items-center gap-1 text-[10px] text-emerald-600 font-medium bg-emerald-50/80 px-2.5 py-1 rounded-full border border-emerald-100">
                            <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            同期済
                        </div>
                    </div>

                    <!-- 問題エリア -->
                    <div class="space-y-3">
                        <span class="text-xs text-slate-400 font-bold tracking-wider block">QUESTION</span>
                        <h2 id="detailQuestion" class="text-xl sm:text-2xl font-medium leading-relaxed tracking-wide mincho-title text-slate-900 whitespace-pre-wrap">
                            <!-- 問題文 -->
                        </h2>
                    </div>

                    <!-- 答え・解説エリア -->
                    <div id="answerArea" class="hidden space-y-6 pt-6 border-t border-black/[0.04] transition-all duration-500">
                        <div class="space-y-2">
                            <span class="text-xs text-rose-400 font-bold tracking-wider block">ANSWER</span>
                            <div id="detailAnswer" class="text-lg sm:text-xl font-bold tracking-wide text-rose-600 mincho-title bg-rose-50/40 p-4 rounded-xl border border-rose-100/30">
                                <!-- 答え -->
                            </div>
                        </div>

                        <div class="space-y-2">
                            <span class="text-xs text-indigo-400 font-bold tracking-wider block">EXPLANATION</span>
                            <p id="detailExplanation" class="text-sm sm:text-base leading-relaxed text-slate-600 tracking-wide pl-1">
                                <!-- 解説 -->
                            </p>
                        </div>
                    </div>

                    <!-- アクションエリア -->
                    <div class="pt-4 flex flex-col sm:flex-row gap-3">
                        <button id="showAnswerBtn" onclick="toggleAnswer()" class="active-scale transition-all-custom w-full py-4 bg-slate-900 text-white rounded-2xl hover:bg-black font-medium text-sm flex items-center justify-center gap-2 shadow-md">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                            <span>答えと解説を表示</span>
                        </button>

                        <button id="nextRiddleBtn" onclick="nextRiddle()" class="active-scale transition-all-custom w-full sm:w-auto px-6 py-4 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded-2xl font-medium text-sm flex items-center justify-center gap-2 shadow-sm">
                            <span>次の問題</span>
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </div>

                </div>
            </div>

        </main>

    </div>

    <!-- トースト通知 -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-xs px-4 py-2.5 rounded-full backdrop-blur shadow-lg pointer-events-none opacity-0 transition-opacity duration-300 z-50 flex items-center gap-1.5">
        <i data-lucide="check" class="w-3.5 h-3.5 text-emerald-400"></i>
        <span id="toastMessage">同期完了</span>
    </div>

    <!-- アプリケーション・ロジック -->
    <script>
        // グローバルなぞなぞデータ (外部からここに注入されます)
        let riddles = [{"question": "気持ちが乗らない時に押すキーボードのボタンは何？", "answer": "U", "explanation": "憂鬱（ゆううつ）だから「U打つ」"}, {"question": "驚いた声を発している動物は何？", "answer": "オットセイ", "explanation": "「『おっ』とsay」"}, {"question": "相撲の王様がいつもしていることは何？", "answer": "喫煙", "explanation": "「smoking」だから「sumo king（相撲キング）」"}, {"question": "ある魚が危なくなる場所はどこ？", "answer": "大気圏", "explanation": "「タイ危険」"}, {"question": "場をそのままにしているのはどこ？", "answer": "バス停", "explanation": "「『ば』ステイ」"}];
        let currentRiddleIndex = -1;

        // UI表示用のDOM要素
        const emptyView = document.getElementById('emptyView');
        const listView = document.getElementById('listView');
        const detailView = document.getElementById('detailView');
        const riddleList = document.getElementById('riddleList');
        const riddleCount = document.getElementById('riddleCount');
        const appStatusIndicator = document.getElementById('appStatusIndicator');

        // 初期化ロード
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // ==========================================
        // 【セットアップ用 API】
        // Termuxやローカル環境からこの関数を呼び出すことでデータが読み込まれます。
        // 例: updateRiddles([{question:"問題", answer:"答え", explanation:"解説"}])
        // ==========================================
        function updateRiddles(newDataList) {
            if (!newDataList || !Array.isArray(newDataList) || newDataList.length === 0) {
                updateAppStatus('error');
                showView(emptyView);
                return;
            }

            // 重複排除とクレンジングを施しながらなぞなぞを取得
            const cleanedList = [];
            const seen = new Set();

            newDataList.forEach(item => {
                if (item && item.question && item.answer) {
                    const q = item.question.trim();
                    if (!seen.has(q)) {
                        seen.add(q);
                        cleanedList.push({
                            question: q,
                            answer: item.answer.trim(),
                            explanation: (item.explanation || '解説はありません。').trim()
                        });
                    }
                }
            });

            if (cleanedList.length === 0) {
                updateAppStatus('error');
                showView(emptyView);
                return;
            }

            // 初回読み込み時はシャッフルしてセット
            riddles = shuffleArray(cleanedList);
            currentRiddleIndex = -1;

            riddleCount.innerText = `なぞなぞ 全 ${riddles.length} 問`;
            renderListView();
            
            updateAppStatus('success');
            showView(listView);
            showToast(`同期完了: ${riddles.length}問のなぞなぞをロードしました`);
        }

        // 配列のランダムシャッフル
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 表示のフェード切り替え
        function showView(viewElement) {
            [emptyView, listView, detailView].forEach(view => {
                if (view === viewElement) {
                    view.classList.remove('hidden');
                    view.classList.add('opacity-0');
                    setTimeout(() => {
                        view.classList.remove('opacity-0');
                        view.classList.add('opacity-100', 'transition-all-custom');
                    }, 50);
                } else {
                    view.classList.add('hidden');
                    view.classList.remove('opacity-100');
                }
            });
        }

        // なぞなぞ一覧リストを描画
        function renderListView() {
            riddleList.innerHTML = '';
            
            riddles.forEach((riddle, index) => {
                const card = document.createElement('div');
                card.className = "active-scale hig-panel p-5 cursor-pointer text-left transition-all-custom flex items-start gap-4 hover:-translate-y-0.5";
                card.setAttribute('onclick', `openRiddle(${index})`);

                card.innerHTML = `
                    <div class="bg-black/5 text-black/60 rounded-xl w-10 h-10 flex-shrink-0 flex items-center justify-center font-semibold text-xs tracking-wider">
                        Q${index + 1}
                    </div>
                    <div class="flex-1 space-y-1 overflow-hidden">
                        <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-relaxed mincho-title tracking-wide">
                            ${riddle.question}
                        </h3>
                        <span class="text-[10px] text-slate-400 font-medium tracking-wider flex items-center gap-1">
                            タップして挑戦
                            <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </span>
                    </div>
                `;
                riddleList.appendChild(card);
            });
            lucide.createIcons();
        }

        // なぞなぞを新しくシャッフル
        function shuffleRiddles() {
            if (riddles.length <= 1) return;
            riddles = shuffleArray(riddles);
            renderListView();
            showToast('なぞなぞを新しくシャッフルしました');
        }

        // 問題詳細ページへ
        function openRiddle(index) {
            currentRiddleIndex = index;
            renderDetailView(true);
            showView(detailView);
        }

        // 個別ページの中身を描画
        function renderDetailView(resetAnswer = true) {
            const riddle = riddles[currentRiddleIndex];
            if (!riddle) return;

            document.getElementById('detailNo').innerText = `RIDDLE Q${currentRiddleIndex + 1} / ${riddles.length}`;
            document.getElementById('detailQuestion').innerText = riddle.question;
            document.getElementById('detailAnswer').innerText = riddle.answer;
            document.getElementById('detailExplanation').innerText = riddle.explanation;

            const answerArea = document.getElementById('answerArea');
            const showAnswerBtn = document.getElementById('showAnswerBtn');

            if (resetAnswer) {
                answerArea.classList.add('hidden');
                showAnswerBtn.innerHTML = `
                    <i data-lucide="eye" class="w-4 h-4"></i>
                    <span>答えと解説を表示</span>
                `;
                showAnswerBtn.classList.remove('bg-slate-200', 'text-slate-700', 'hover:bg-slate-300');
                showAnswerBtn.classList.add('bg-slate-900', 'text-white', 'hover:bg-black');
            } else {
                if (!answerArea.classList.contains('hidden')) {
                    showAnswerBtn.innerHTML = `
                        <i data-lucide="eye-off" class="w-4 h-4"></i>
                        <span>答えと解説を隠す</span>
                    `;
                    showAnswerBtn.classList.remove('bg-slate-900', 'text-white', 'hover:bg-black');
                    showAnswerBtn.classList.add('bg-slate-200', 'text-slate-700', 'hover:bg-slate-300');
                }
            }

            // 「次の問題」ボタンの設定（最後の問題なら「一覧に戻る」にしてループを防ぐ）
            const nextBtn = document.getElementById('nextRiddleBtn');
            if (currentRiddleIndex === riddles.length - 1) {
                nextBtn.innerHTML = `
                    <span>一覧に戻る</span>
                    <i data-lucide="list" class="w-4 h-4"></i>
                `;
            } else {
                nextBtn.innerHTML = `
                    <span>次の問題</span>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                `;
            }

            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 答えトグル
        function toggleAnswer() {
            const answerArea = document.getElementById('answerArea');
            const showAnswerBtn = document.getElementById('showAnswerBtn');
            const isHidden = answerArea.classList.contains('hidden');

            if (isHidden) {
                answerArea.classList.remove('hidden');
                answerArea.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => {
                    answerArea.classList.remove('opacity-0', 'translate-y-2');
                    answerArea.classList.add('opacity-100', 'translate-y-0', 'transition-all', 'duration-500');
                }, 50);

                showAnswerBtn.innerHTML = `
                    <i data-lucide="eye-off" class="w-4 h-4"></i>
                    <span>答えと解説を隠す</span>
                `;
                showAnswerBtn.classList.remove('bg-slate-900', 'text-white', 'hover:bg-black');
                showAnswerBtn.classList.add('bg-slate-200', 'text-slate-700', 'hover:bg-slate-300');
            } else {
                answerArea.classList.add('hidden');
                showAnswerBtn.innerHTML = `
                    <i data-lucide="eye" class="w-4 h-4"></i>
                    <span>答えと解説を表示</span>
                `;
                showAnswerBtn.classList.remove('bg-slate-200', 'text-slate-700', 'hover:bg-slate-300');
                showAnswerBtn.classList.add('bg-slate-900', 'text-white', 'hover:bg-black');
            }
            lucide.createIcons();
        }

        // 次の問題、あるいは一覧へ
        function nextRiddle() {
            if (currentRiddleIndex === riddles.length - 1) {
                backToList();
            } else {
                openRiddle(currentRiddleIndex + 1);
            }
        }

        // 一覧画面へ戻る
        function backToList() {
            currentRiddleIndex = -1;
            showView(listView);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // アプリの状態表示インジケータ
        function updateAppStatus(status) {
            if (status === 'success') {
                appStatusIndicator.className = "text-[10px] text-emerald-600 bg-emerald-50 border border-emerald-100 px-2.5 py-1 rounded-full flex items-center gap-1.5 shadow-sm";
                appStatusIndicator.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i>接続完了`;
            } else if (status === 'error') {
                appStatusIndicator.className = "text-[10px] text-rose-500 bg-rose-50 border border-rose-100 px-2.5 py-1 rounded-full flex items-center gap-1.5 shadow-sm";
                appStatusIndicator.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i>データエラー`;
            }
            lucide.createIcons();
        }

        // トースト通知
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            
            toastMsg.innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }
    </script>











<script>window.addEventListener('DOMContentLoaded', () => { setTimeout(() => { updateRiddles([{"question": "気持ちが乗らない時に押すキーボードのボタンは何？", "answer": "U", "explanation": "憂鬱（ゆううつ）だから「U打つ」"}, {"question": "驚いた声を発している動物は何？", "answer": "オットセイ", "explanation": "「『おっ』とsay」"}, {"question": "相撲の王様がいつもしていることは何？", "answer": "喫煙", "explanation": "「smoking」だから「sumo king（相撲キング）」"}, {"question": "ある魚が危なくなる場所はどこ？", "answer": "大気圏", "explanation": "「タイ危険」"}, {"question": "場をそのままにしているのはどこ？", "answer": "バス停", "explanation": "「『ば』ステイ」"}]); }, 300); });</script>
</body>
</html>
